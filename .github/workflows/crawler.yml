name: Daily Hanatour Crawling

on:
  schedule:
    - cron: '0 21 * * *'  # 매일 한국 시간 오전 6시 자동 실행
  workflow_dispatch:      # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.46.0-noble

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas gspread google-auth playwright playwright-stealth openai
          python -m playwright install chromium

      # 💡 단수형 구조로 완벽하게 4개의 보안 통행증을 주입하며, crawling.py를 실행합니다.
      - name: Run Hanatour New Crawler
        env:
          GOOGLE_JSON_RAW: ${{ secrets.GOOGLE_JSON_RAW }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SOURCE_SPREADSHEET_ID: ${{ secrets.SOURCE_SPREADSHEET_ID }}
          TARGET_SPREADSHEET_ID: ${{ secrets.TARGET_SPREADSHEET_ID }} # 🌟 단수형 구조로 완벽 매칭
        run: |
          python -u crawling.py # 🌟 실제 파일명인 crawling.py로 고정 완료
