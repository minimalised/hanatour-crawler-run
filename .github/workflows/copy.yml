name: Auto Powerlink Copy Generator

on:
  # 깃허브 웹 Actions 탭에서 원할 때 언제든 수동으로 실행
  workflow_dispatch:
  
  # 매일 정해진 시간(예: 한국 시간 오전 9시 / UTC 00:00)에 자동 실행
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 패키지 캐싱으로 다음 실행부터 속도 업

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas gspread oauth2client playwright openai
        
    - name: Playwright 브라우저 및 의존성 설치 (크롤링용)
      run: |
        playwright install chromium --with-deps

    - name: 파이썬 스크립트 실행
      env:
        GOOGLE_JSON_RAW: ${{ secrets.GOOGLE_JSON_RAW }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SOURCE_SPREADSHEET_ID: ${{ secrets.SOURCE_SPREADSHEET_ID }}
        TARGET_SPREADSHEET_ID: ${{ secrets.TARGET_SPREADSHEET_ID }}
      run: |
        python generate_copy.py
