name: Auto Powerlink Copy Generator

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # 캐시 설정(cache: 'pip')을 제거하여 requirements.txt 체크를 건너뜁니다.

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas gspread oauth2client playwright openai
        
    - name: Playwright 브라우저 및 의존성 설치 (크롤링용)
      run: |
        playwright install chromium --with-deps

    - name: 파이썬 스크립트 실행
      env:
        GOOGLE_JSON_RAW: ${{ secrets.GOOGLE_JSON_RAW }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SOURCE_SPREADSHEET_ID: ${{ secrets.SOURCE_SPREADSHEET_ID }}
        TARGET_SPREADSHEET_ID: ${{ secrets.TARGET_SPREADSHEET_ID }}
      run: |
        python generate_copy.py
