name: "C-2. [중복제거] 상품 정리"

on:
  workflow_run:
    # 💡 C-1 워크플로우의 'name'과 토씨 하나 틀리지 않게 똑같이 맞춰줍니다.
    workflows: ["C-1. [동기화] 구글드라이브 파일 가져오기"]
    types:
      - completed

  repository_dispatch:
    types: [run_product_pipeline]
  workflow_dispatch: 

jobs:
  build_and_run:
    # 💡 C-1이 도중에 실패하지 않고 '성공(success)'으로 완료되었을 때만 작동하거나,
    # 사용자가 수동(workflow_dispatch) 또는 외부 이벤트(repository_dispatch)로 켰을 때 실행되도록 조건을 걸어줍니다.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15 

    steps:
    - name: 저장소 코드 체크아웃
      uses: actions/checkout@v4

    - name: Python 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas gspread google-auth openpyxl openai

    - name: 데이터 처리 및 상품명 재조합 실행
      env:
        GOOGLE_JSON_RAW: ${{ secrets.GOOGLE_JSON_RAW }}
        SOURCE_SPREADSHEET_ID: ${{ secrets.SOURCE_SPREADSHEET_ID }}
        TARGET_SPREADSHEET_ID: ${{ secrets.TARGET_SPREADSHEET_ID }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python pipeline_dedup.py

    - name: 캐시 파일(product_cache.json) 업데이트 및 커밋
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        if [ -f "product_cache.json" ]; then
          git add product_cache.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: 🤖 파이프라인 LLM 상품 캐시 업데이트"
            git push
            echo "✅ 캐시 파일이 레포지토리에 성공적으로 업데이트되었습니다."
          else
            echo "ℹ️ 캐시 파일에 변경 사항이 없습니다."
          fi
        else
          echo "⚠️ 캐시 파일이 존재하지 않습니다."
        fi
