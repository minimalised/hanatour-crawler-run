name: Product List Pipeline (De-duplication & Remake)

on:
  repository_dispatch:
    types: [run_product_pipeline]
  workflow_dispatch: 

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    timeout-minutes: 15 

    steps:
    - name: 저장소 코드 체크아웃
      uses: actions/checkout@v4

    - name: Python 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas gspread google-auth openpyxl

    - name: 데이터 처리 및 상품명 재조합 실행
      env:
        GOOGLE_JSON_RAW: ${{ secrets.GOOGLE_JSON_RAW }}
        SOURCE_SPREADSHEET_ID: ${{ secrets.SOURCE_SPREADSHEET_ID }}
        TARGET_SPREADSHEET_ID: ${{ secrets.TARGET_SPREADSHEET_ID }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python pipeline_dedup.py
