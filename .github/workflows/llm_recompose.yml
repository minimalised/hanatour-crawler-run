name: "C-3. [LLM] 네이버 쇼핑 상품명 재구성"

on:
  workflow_run:
    workflows: ["C-2. [중복제거] 상품 정리"]
    types:
      - completed

  workflow_dispatch:


jobs:
  run-llm-pipeline:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install gspread google-auth openai

    - name: Run LLM Processing Script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SOURCE_SPREADSHEET_ID: ${{ secrets.SOURCE_SPREADSHEET_ID }} 
        GOOGLE_JSON_RAW: ${{ secrets.GOOGLE_JSON_RAW }}
      run: |
        python llm_recompose.py

    - name: Commit and Push Cache Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add product_cache.json
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "🤖 갱신: 상품 캐시 데이터 업데이트 (Incremental)"
          git pull --rebase origin main
          git push origin main
        else
          echo "변경 사항이 없어 푸시를 건너뜁니다."
        fi
