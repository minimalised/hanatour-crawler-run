name: Daily Product LLM Recomposition

on:
  # 🔥 중요: 기존 액션의 name인 "Daily Hanatour Data Sync"와 완벽히 일치시켰습니다.
  workflow_run:
    workflows: ["Daily Hanatour Data Sync"]
    types:
      - completed

  # 내가 원할 때 깃허브 웹에서 [Run workflow] 버튼으로 수동 실행
  workflow_dispatch:


jobs:
  run-llm-pipeline:
    # 자동 체이닝 시 '성공'했을 때만 실행되도록 하고, 수동 실행이나 스케줄러일 때는 바로 실행
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install gspread google-auth openai

    - name: Run LLM Processing Script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SOURCE_SHEET_ID: ${{ secrets.SOURCE_SHEET_ID }}
        GOOGLE_JSON_RAW: ${{ secrets.GOOGLE_JSON_RAW }}
      run: |
        # 저장하신 파일명인 combining.py로 실행합니다.
        python combining.py

    - name: Commit and Push Cache Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add product_cache.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 갱신: 상품 캐시 데이터 업데이트 (Incremental)" && git push)
