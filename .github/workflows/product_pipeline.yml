name: Product List Pipeline (De-duplication & Remake)

on:
  repository_dispatch:
    types: [run_product_pipeline]
  workflow_dispatch: # GitHub에서 버튼 눌러서 수동 실행 가능

jobs:
  build_and_run:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 체크아웃
      uses: actions/checkout@v4

    - name: Python 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas google-api-python-client google-auth-httplib2 google-auth-oauthlib openpyxl

    - name: 데이터 처리 및 상품명 재조합 실행
      env:
        # 보내주신 이미지의 Secrets 이름과 100% 일치시켰습니다.
        GOOGLE_JSON_RAW: ${{ secrets.GOOGLE_JSON_RAW }}
        SOURCE_SPREADSHEET_ID: ${{ secrets.SOURCE_SPREADSHEET_ID }}
        TARGET_SPREADSHEET_ID: ${{ secrets.TARGET_SPREADSHEET_ID }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} # 상품명 재조합에 혹시 OpenAI를 쓰신다면 연동되도록 추가
      run: |
        python pipeline.py
