name: "1. [크롤링] 퀵서치 상품 리스트"

on:
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.46.0-noble

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas gspread google-auth playwright playwright-stealth openai
          python -m playwright install chromium

      - name: Run Hanatour New Crawler
        env:
          GOOGLE_JSON_RAW: ${{ secrets.GOOGLE_JSON_RAW }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SOURCE_SPREADSHEET_ID: ${{ secrets.SOURCE_SPREADSHEET_ID }}
          TARGET_SPREADSHEET_ID: ${{ secrets.TARGET_SPREADSHEET_ID }}
        run: |
          python -u crawl_daily.py
